<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course de Voitures</title>
    <link rel="stylesheet" href="./course.css" />
  </head>
  <body>
    <header>
      <div class="top_container">
        <div class="chrono_mauve">
          <p>Voiture mauve</p>
          <span id="chrono1">00:00:00</span>
        </div>
        <div class="button"> 
          <h1>Course de Voitures</h1>
          <button type="button" id="demarrerCourse" onclick="demarrerCourse()">
            Démarer la course
          </button>
         
          <button type="button" id="arreterCourse" onclick="arreterCourse()">
            Arrêter la course
          </button>
        </div>
        <div class="chrono_rouge">
          <p>Voiture rouge</p>
          <span id="chrono2">00:00:00</span>
        </div>
      </div>
    </header>
    <main>
      <div class="container_voiture">
        <div class="voiture_mauve">
          <img class="mauve" src="./asset/img/voitures mauve.png" alt="" />
        </div>
        <div class="voiture_rouge">
          <img class="rouge" src="./asset/img/voitures rouge.png" alt="" />
        </div>
      </div>
      <div id="message"></div>
    </main>
    <script src="course.js"></script>
  </body>
</html>
